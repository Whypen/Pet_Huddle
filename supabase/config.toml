project_id = "ztrbourwcnhrpmzwlrcn"

[auth]
site_url = "https://huddle.pet"
additional_redirect_urls = [
  "https://huddle.pet/**",
  "http://localhost:5173/**",
  "http://localhost:8080/**",
  "http://localhost:8081/**",
  "http://localhost:8082/**",
  "http://localhost:8083/**",
  "https://*-huddleapp.vercel.app/**",
  "https://huddle.pet/auth/callback",
  "https://www.huddle.pet/auth/callback",
  "https://huddle.pet/update-password",
  "https://huddle-huddleapp.vercel.app/auth/callback",
  "https://huddle-huddleapp.vercel.app/update-password",
  "https://huddle-git-main-huddleapp.vercel.app/auth/callback",
  "https://huddle-git-main-huddleapp.vercel.app/update-password",
  "http://localhost:8080/auth/callback",
  "http://localhost:8080/update-password",
]
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits_symbols"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_confirmations = true
secure_password_change = true
max_frequency = "1m0s"
otp_length = 8

[auth.sms]
enable_signup = true
template = "Your Verification code is {{ .Code }}. Drop it in and join the Huddle community!"

[auth.sms.twilio]
enabled = true
account_sid = ""
message_service_sid = ""
auth_token = ""

[auth.sms.test_otp]
85264148332 = "498005"

# Pre-auth functions: gateway JWT verification disabled.
# verify_jwt = true expects legacy JWT-shaped API keys and is incompatible
# with sb_publishable/sb_secret keys. These are called before a user session
# exists; Turnstile validation is the internal access gate for each.
[functions.auth-login]
verify_jwt = false

[functions.auth-signup]
verify_jwt = false

[functions.auth-reset-password]
verify_jwt = false

[functions.send-pre-signup-verify]
verify_jwt = false

# confirm-pre-signup-verify: browser callback from /verify email links.
# Token in URL is the auth, so gateway JWT verification must stay off.
[functions.confirm-pre-signup-verify]
verify_jwt = false

# get-pre-signup-verify-status: polled from the public signup verify-email page.
# Browser callers use the publishable key and no user session yet.
[functions.get-pre-signup-verify-status]
verify_jwt = false

[functions.auth-protection-health]
verify_jwt = false

[functions.verify-device-fingerprint]
verify_jwt = false

[functions.verify-human-challenge]
verify_jwt = false

[functions.create-identity-setup-intent]
verify_jwt = false

[functions.create-checkout-session]
verify_jwt = false

[functions.create-stripe-connect-link]
verify_jwt = false

[functions.create-or-get-stripe-account]
verify_jwt = false

[functions.create-account-session]
verify_jwt = false

[functions.refresh-stripe-account-status]
verify_jwt = false

[functions.cancel-subscription]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

# link-preview is a public OG-scraping utility: no user session exists when
# fetching share previews in the social feed. Frontend sends only the
# publishable key as Bearer; verify_jwt = true would reject that immediately.
[functions.link-preview]
verify_jwt = false

# auth-change-password: called via postPublicFunction (publishable key as Bearer).
# Internal gate: Turnstile + extractToken() (3-part JWT, excludes anon/service keys)
# + supabase.auth.getUser() ownership check.
[functions.auth-change-password]
verify_jwt = false

# send-phone-otp: called via postPublicFunction (publishable key as Bearer).
# Internal gate: Turnstile (required) + JWT extraction + DB rate limit + country allowlist.
[functions.send-phone-otp]
verify_jwt = false

# verify-phone-otp: sms path called via postPublicFunction; phone_change path via
# invokeAuthedFunction. Internal gate: JWT extraction + phone_change requires userId
# + DB 3-attempt cap per phone per 24 h.
[functions.verify-phone-otp]
verify_jwt = false

# health-check: internal infra probe, no sensitive data returned.
[functions.health-check]
verify_jwt = false

# stripe-pricing: public pricing data, no user data exposed. Optional JWT used
# only to resolve user currency preference; falls back to USD.
[functions.stripe-pricing]
verify_jwt = false

# send-signup-verify-email: called from signup flow with user session JWT.
# Internal gate: requires valid user JWT + JWT sub must match body user_id.
[functions.send-signup-verify-email]
verify_jwt = false

# confirm-signup-email: browser callback from signup verification email links.
# The uid+token in the URL is the verifier; no session exists yet.
[functions.confirm-signup-email]
verify_jwt = false

# delete-account: called from authenticated app flow.
# Internal gate: explicit Bearer token extraction + admin.auth.getUser(token).
[functions.delete-account]
verify_jwt = false
