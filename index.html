<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>huddle</title>
    <meta name="description" content="huddle - Your pet care super-app" />
    <meta name="author" content="huddle" />
    <link rel="icon" type="image/png" sizes="32x32" href="/huddle-favicon-32-v5.png" />
    <link rel="icon" type="image/png" href="/huddle-favicon-v5.png" />
    <link rel="apple-touch-icon" href="/huddle-apple-touch-icon-v5.png" />
    <meta property="og:title" content="huddle" />
    <meta property="og:description" content="Your pet care super-app" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@huddlepets" />

    <!-- PWA meta tags -->
    <meta name="theme-color" content="#3283ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Image CDN warm-up for instant link preview thumbnails -->
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin />
    <link rel="preconnect" href="https://i.scdn.co" crossorigin />
    <link rel="dns-prefetch" href="https://i.ytimg.com" />
    <link rel="dns-prefetch" href="https://i.scdn.co" />

    <!-- Stripe connection warm-up: pre-resolve DNS and open TCP connections so
         the card iframe does not hit a cold ERR_CONNECTION_CLOSED on first mount -->
    <link rel="preconnect" href="https://js.stripe.com" crossorigin />
    <link rel="preconnect" href="https://m.stripe.com" crossorigin />
    <link rel="preconnect" href="https://m.stripe.network" crossorigin />
    <link rel="dns-prefetch" href="https://js.stripe.com" />
    <link rel="dns-prefetch" href="https://m.stripe.com" />
    <link rel="dns-prefetch" href="https://m.stripe.network" />
  </head>

  <body style="background-color:#D5DFEF;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
